services:

  app:
    build: .
    volumes:
      - ./storage:/var/www/storage
      - ./public/images:/var/www/public/images
    env_file: .env.docker
    depends_on:
      db:
        condition: service_healthy
    networks:
      - iroyin

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - iroyin

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: iroyin
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - iroyin

networks:
  iroyin:

volumes:
  dbdata:
